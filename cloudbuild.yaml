steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'asia-south1-docker.pkg.dev/$PROJECT_ID/ballot-journey-repo/the-ballot-journey:$COMMIT_SHA', '.']
  
  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'asia-south1-docker.pkg.dev/$PROJECT_ID/ballot-journey-repo/the-ballot-journey:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'the-ballot-journey'
      - '--image'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/ballot-journey-repo/the-ballot-journey:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '1'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/ballot-journey-repo/the-ballot-journey:$COMMIT_SHA'
